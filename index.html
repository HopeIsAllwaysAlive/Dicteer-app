<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dicteer">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <title>Dicteer App</title>
    <style>
        :root {
            /* Light theme variables */
            --bg-gradient-start: #667eea;
            --bg-gradient-end: #764ba2;
            --container-bg: rgba(255, 255, 255, 0.85);
            --text-main: #333333;
            --text-sub: #666666;
            --btn-primary: #007aff;
            --btn-primary-hover: #0056b3;
            --btn-secondary: rgba(242, 242, 247, 0.8);
            --btn-secondary-hover: rgba(229, 229, 234, 0.9);
            --border-color: rgba(229, 229, 234, 0.8);
            --panel-bg: rgba(248, 249, 250, 0.6);
            --glass-blur: 20px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* Dark theme variables */
                --bg-gradient-start: #1a1a2e;
                --bg-gradient-end: #16213e;
                --container-bg: rgba(28, 28, 30, 0.85);
                --text-main: #ffffff;
                --text-sub: #ebebf599;
                --btn-primary: #0a84ff;
                --btn-primary-hover: #006ee6;
                --btn-secondary: rgba(44, 44, 46, 0.8);
                --btn-secondary-hover: rgba(58, 58, 60, 0.9);
                --border-color: rgba(56, 56, 58, 0.8);
                --panel-bg: rgba(44, 44, 46, 0.6);
            }
        }

        /* Themes override preferences */
        body[data-theme="dark"] {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --container-bg: rgba(28, 28, 30, 0.85);
            --text-main: #ffffff;
            --text-sub: #ebebf599;
            --btn-primary: #0a84ff;
            --btn-primary-hover: #006ee6;
            --btn-secondary: rgba(44, 44, 46, 0.8);
            --btn-secondary-hover: rgba(58, 58, 60, 0.9);
            --border-color: rgba(56, 56, 58, 0.8);
            --panel-bg: rgba(44, 44, 46, 0.6);
        }

        body[data-theme="light"] {
            --bg-gradient-start: #667eea;
            --bg-gradient-end: #764ba2;
            --container-bg: rgba(255, 255, 255, 0.85);
            --text-main: #333333;
            --text-sub: #666666;
            --btn-primary: #007aff;
            --btn-primary-hover: #0056b3;
            --btn-secondary: rgba(242, 242, 247, 0.8);
            --btn-secondary-hover: rgba(229, 229, 234, 0.9);
            --border-color: rgba(229, 229, 234, 0.8);
            --panel-bg: rgba(248, 249, 250, 0.6);
        }

        body[data-theme="ocean"] {
            --bg-gradient-start: #0f2027;
            --bg-gradient-end: #203a43;
            --container-bg: rgba(32, 58, 67, 0.85);
            --text-main: #ffffff;
            --text-sub: #a0c4c4;
            --btn-primary: #00b4db;
            --btn-primary-hover: #0083b0;
            --btn-secondary: rgba(15, 32, 39, 0.6);
            --btn-secondary-hover: rgba(15, 32, 39, 0.9);
            --border-color: rgba(0, 180, 219, 0.3);
            --panel-bg: rgba(15, 32, 39, 0.5);
        }

        body[data-theme="sunset"] {
            --bg-gradient-start: #ff7e5f;
            --bg-gradient-end: #feb47b;
            --container-bg: rgba(255, 245, 238, 0.85);
            --text-main: #4a282f;
            --text-sub: #ab576c;
            --btn-primary: #f64f59;
            --btn-primary-hover: #c471ed;
            --btn-secondary: rgba(255, 255, 255, 0.6);
            --btn-secondary-hover: rgba(255, 255, 255, 0.9);
            --border-color: rgba(246, 79, 89, 0.3);
            --panel-bg: rgba(255, 255, 255, 0.5);
        }

        @media (prefers-color-scheme: dark) {

            body:not([data-theme="light"]):not([data-theme="sunset"]) textarea,
            body:not([data-theme="light"]):not([data-theme="sunset"]) select {
                background-color: rgba(28, 28, 30, 0.5);
                color: #ffffff;
            }
        }

        body[data-theme="dark"] textarea,
        body[data-theme="dark"] select,
        body[data-theme="ocean"] textarea,
        body[data-theme="ocean"] select {
            background-color: rgba(28, 28, 30, 0.5);
            color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            /* Remove tap highlight on iOS */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            position: relative;
            background: var(--container-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border-radius: 24px;
            /* More rounded for iOS */
            padding: 30px 24px;
            max-width: 700px;
            width: 90%;
            /* Better padding on mobile */
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: var(--text-main);
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-sub);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 14px 24px;
            border: none;
            border-radius: 14px;
            /* iOS style buttons */
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        #startBtn {
            background: var(--btn-primary);
            color: white;
            flex: 1;
            min-width: 150px;
            box-shadow: 0 4px 14px rgba(0, 122, 255, 0.3);
        }

        #startBtn:hover {
            background: var(--btn-primary-hover);
            transform: scale(0.98);
        }

        #startBtn.listening {
            background: #ff3b30;
            /* iOS Red */
            box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7);
            animation: pulse-ring 1.5s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(255, 59, 48, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 59, 48, 0);
            }
        }

        #clearBtn,
        #copyBtn {
            background: var(--btn-secondary);
            color: var(--text-main);
        }

        #clearBtn:hover,
        #copyBtn:hover {
            background: var(--btn-secondary-hover);
            transform: scale(0.98);
        }

        .language-selector {
            margin-bottom: 20px;
        }

        select {
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            font-size: 16px;
            width: 100%;
            max-width: 200px;
            background-color: var(--container-bg);
            color: var(--text-main);
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }

        textarea {
            width: 100%;
            min-height: 250px;
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            font-size: 17px;
            resize: vertical;
            font-family: inherit;
            line-height: 1.5;
            background-color: var(--container-bg);
            color: var(--text-main);
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--btn-primary);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        .word-counter {
            text-align: right;
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 8px;
            padding-right: 5px;
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }

        .status.listening {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
        }

        .status.info {
            background: #e3f2fd;
            color: #1565c0;
        }

        .hidden {
            display: none;
        }

        .action-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            padding: 14px 16px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            background: var(--container-bg);
            color: var(--text-main);
            border: 2px solid var(--border-color);
            min-width: calc(50% - 5px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .action-btn.primary {
            background: var(--btn-secondary);
            border-color: var(--btn-secondary);
        }

        .action-btn.danger {
            color: #ff3b30;
            border-color: #ff3b30;
            background: transparent;
        }

        .action-btn:hover {
            transform: scale(0.98);
            border-color: var(--btn-primary);
        }

        .action-btn.danger:hover {
            background: #ffebee;
            border-color: #ff3b30;
        }

        @media (prefers-color-scheme: dark) {
            .action-btn.danger:hover {
                background: rgba(255, 59, 48, 0.1);
            }
        }

        /* Historie sectie */
        .history-section {
            margin-top: 30px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .history-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-history-btn {
            background: transparent;
            border: none;
            color: #ff3b30;
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .clear-history-btn:hover {
            background: rgba(255, 59, 48, 0.1);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
        }

        .history-item {
            padding: 14px 16px;
            background: var(--panel-bg);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background: var(--btn-secondary);
            border-color: var(--border-color);
            transform: translateY(-1px);
        }

        .history-date {
            font-size: 11px;
            color: var(--text-sub);
            margin-bottom: 4px;
        }

        .history-preview {
            font-size: 14px;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
        }

        .empty-history {
            text-align: center;
            color: var(--text-sub);
            font-size: 14px;
            padding: 20px 0;
            font-style: italic;
        }

        /* Custom scrollbar for history */
        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-in {
            animation: slideDown 0.3s ease-out forwards;
        }

        /* Settings Modal & Buttons */
        .settings-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            background: transparent;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-sub);
            padding: 5px;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .settings-btn:hover {
            transform: rotate(45deg);
            color: var(--text-main);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--container-bg);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transform: scale(0.95);
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 20px;
            color: var(--text-main);
        }

        .close-modal {
            background: transparent;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-sub);
        }

        /* Undo Toast */
        .undo-toast {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-main);
            color: var(--container-bg);
            padding: 12px 20px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
            transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        .undo-toast.show {
            bottom: 30px;
        }

        .undo-btn {
            background: var(--btn-primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container">
        <button class="settings-btn" id="openSettingsBtn" aria-label="Instellingen">⚙️</button>
        <h1>🎤 Dicteer App</h1>
        <p class="subtitle">Spreek duidelijk in je microfoon</p>

        <div class="controls" style="margin-top: 20px;">
            <button id="startBtn">🎤 Start Opname</button>
        </div>

        <textarea id="textArea" placeholder="Je getypte tekst verschijnt hier..."></textarea>
        <div id="charCount" class="word-counter">0 woorden, 0 karakters</div>

        <div id="status" class="status hidden"></div>

        <div class="action-row">
            <button id="shareBtn" class="action-btn primary">📤 Delen</button>
            <button id="newCalendarBtn" class="action-btn">📅 Afspraak</button>
            <button id="newTaskBtn" class="action-btn">✅ Taak</button>
            <button id="clearBtn" class="action-btn danger">🗑️ Wissen</button>
        </div>

        <div class="history-section">
            <div class="history-title">
                Historie
            </div>
            <div id="historyList" class="history-list">
                <!-- Historie items komen hier -->
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Instellingen</h2>
                <button class="close-modal" id="closeSettingsBtn">&times;</button>
            </div>

            <div class="language-selector" style="margin-bottom: 15px;">
                <label for="language"
                    style="display:block; margin-bottom:5px; font-weight:600; color:var(--text-sub);">Spraak
                    Taal</label>
                <select id="language" style="max-width: 100%;">
                    <option value="nl-NL">Nederlands</option>
                    <option value="en-US">Engels (VS)</option>
                    <option value="en-GB">Engels (UK)</option>
                    <option value="de-DE">Duits</option>
                    <option value="fr-FR">Frans</option>
                    <option value="es-ES">Spaans</option>
                </select>
            </div>

            <div class="theme-selector" style="margin-bottom: 25px;">
                <label for="themeSelect"
                    style="display:block; margin-bottom:5px; font-weight:600; color:var(--text-sub);">Kleur
                    Thema</label>
                <select id="themeSelect" style="max-width: 100%;">
                    <option value="auto">Systeem (Automatisch)</option>
                    <option value="light">Licht</option>
                    <option value="dark">Donker (Nacht)</option>
                    <option value="ocean">Oceaan (Blauw)</option>
                    <option value="sunset">Zonsondergang (Roze)</option>
                </select>
            </div>

            <div style="border-top: 1px solid var(--border-color); padding-top: 15px;">
                <button id="clearHistoryBtn" class="action-btn danger" style="width: 100%;">Gedeelde Historie
                    Wissen</button>
            </div>
        </div>
    </div>

    <!-- Undo Toast -->
    <div class="undo-toast" id="undoToast">
        <span>Tekst gewist</span>
        <button class="undo-btn" id="undoBtn">Ongedaan maken</button>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const clearBtn = document.getElementById('clearBtn');
        const shareBtn = document.getElementById('shareBtn');
        const newCalendarBtn = document.getElementById('newCalendarBtn');
        const newTaskBtn = document.getElementById('newTaskBtn');
        const textArea = document.getElementById('textArea');
        const statusDiv = document.getElementById('status');
        const languageSelect = document.getElementById('language');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const charCount = document.getElementById('charCount');

        // Modal & Instellingen elementen
        const openSettingsBtn = document.getElementById('openSettingsBtn');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const themeSelect = document.getElementById('themeSelect');

        // Undo elementen
        const undoToast = document.getElementById('undoToast');
        const undoBtn = document.getElementById('undoBtn');

        let recognition;
        let isListening = false;
        let wakeLock = null;
        let currentDictationText = '';
        let historyArray = JSON.parse(localStorage.getItem('dicteerHistory')) || [];

        let tempDeletedText = '';
        let undoTimeout = null;

        // --- Instellingen & Thema logica ---
        const savedTheme = localStorage.getItem('dicteerTheme') || 'auto';
        themeSelect.value = savedTheme;
        applyTheme(savedTheme);

        function applyTheme(themeName) {
            if (themeName === 'auto') {
                document.body.removeAttribute('data-theme');
            } else {
                document.body.setAttribute('data-theme', themeName);
            }
            // Zorg dat de kleur in de header meegaat voor mobiel browsers
            let topColor = '#667eea';
            if (themeName === 'dark') topColor = '#1a1a2e';
            if (themeName === 'ocean') topColor = '#0f2027';
            if (themeName === 'sunset') topColor = '#ff7e5f';

            // Als we auto sturen laten we theme-color gerust of stellen default in
            const metaTheme = document.querySelector('meta[name="theme-color"]');
            if (metaTheme) metaTheme.setAttribute('content', topColor);
        }

        themeSelect.addEventListener('change', (e) => {
            const theme = e.target.value;
            applyTheme(theme);
            localStorage.setItem('dicteerTheme', theme);
        });

        openSettingsBtn.addEventListener('click', () => {
            settingsModal.classList.add('active');
        });

        closeSettingsBtn.addEventListener('click', () => {
            settingsModal.classList.remove('active');
        });

        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) {
                settingsModal.classList.remove('active');
            }
        });

        // --- Woorden & Karakters Teller ---
        function updateWordCount() {
            const text = textArea.value.trim();
            if (!text) {
                charCount.textContent = '0 woorden, 0 karakters';
                return;
            }
            const words = text.split(/\s+/).filter(word => word.length > 0).length;
            const chars = text.length;
            charCount.textContent = `${words} woord${words !== 1 ? 'en' : ''}, ${chars} karakter${chars !== 1 ? 's' : ''}`;
        }

        textArea.addEventListener('input', updateWordCount);

        // Functie om Wake Lock aan te vragen (scherm aan houden)
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock is active');
                }
            } catch (err) {
                console.error(`Wake Lock error: ${err.name}, ${err.message}`);
            }
        }

        // Functie om Wake Lock vrij te geven
        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release()
                    .then(() => {
                        wakeLock = null;
                        console.log('Wake Lock released');
                    });
            }
        }

        // Check of browser spraakherkenning ondersteunt
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            showStatus('Spraakherkenning vereist een veilige (HTTPS) verbinding, of wordt niet ondersteund door je browser.', 'error');
            startBtn.disabled = true;
        } else {
            // Initialiseer spraakherkenning
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();

            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = languageSelect.value;

            let lastSegmentTime = Date.now();

            // Update taal bij wijziging 
            languageSelect.addEventListener('change', () => {
                recognition.lang = languageSelect.value;
                if (isListening) {
                    recognition.stop();
                    setTimeout(() => recognition.start(), 100);
                }
            });

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }

                if (finalTranscript) {
                    const now = Date.now();
                    const timeSinceLastSegment = now - lastSegmentTime;
                    lastSegmentTime = now;

                    // Voeg leestekens toe
                    let processed = finalTranscript.trim();

                    // Maak eerste letter hoofdletter als tekstveld leeg is of na punt
                    const currentText = textArea.value.trim();
                    if (currentText === '' || currentText.endsWith('.') || currentText.endsWith('?') || currentText.endsWith('!')) {
                        processed = processed.charAt(0).toUpperCase() + processed.slice(1);
                    }

                    // Voeg punt toe aan het einde als er een pauze van meer dan 2 seconden was
                    if (timeSinceLastSegment > 2000 && currentText !== '') {
                        // Voeg punt toe aan vorige tekst als die nog geen leesteken heeft
                        const lastChar = currentText.slice(-1);
                        if (lastChar !== '.' && lastChar !== '?' && lastChar !== '!' && lastChar !== ',') {
                            textArea.value = currentText + '. ';
                        }
                        processed = processed.charAt(0).toUpperCase() + processed.slice(1);
                    }

                    textArea.value += processed + ' ';
                }
            };

            recognition.onstart = () => {
                isListening = true;
                startBtn.innerHTML = '⏹️ Stop Opname';
                startBtn.classList.add('listening');
                showStatus('Luisteren... Spreek nu!', 'listening');

                // Haptische feedback als beschikbaar
                if (navigator.vibrate) {
                    try {
                        navigator.vibrate(50);
                    } catch (e) { }
                }

                currentDictationText = ''; // Reset the session text when starting

                requestWakeLock();
            };

            recognition.onend = () => {
                isListening = false;
                startBtn.innerHTML = '🎤 Start Opname';
                startBtn.classList.remove('listening');
                releaseWakeLock();

                // Voeg punt toe aan het einde als tekst niet eindigt met leesteken
                const text = textArea.value.trim();
                let newAddition = text;

                if (text !== '') {
                    const lastChar = text.slice(-1);
                    if (lastChar !== '.' && lastChar !== '?' && lastChar !== '!' && lastChar !== ',') {
                        textArea.value = text + '.\n\n';
                        newAddition = text + '.';
                    } else {
                        textArea.value = text + '\n\n';
                    }
                }

                // Sla de nieuwste zin/blok op in history (als het niet leeg is en niet alleen uit spaties bestaat)
                if (newAddition && newAddition.trim().length > 3) {
                    saveToHistory(newAddition.trim());
                }

                updateWordCount();

                if (statusDiv.textContent.includes('Luisteren')) {
                    hideStatus();
                }
            };

            recognition.onerror = (event) => {
                if (event.error === 'no-speech') {
                    showStatus('Geen spraak gedetecteerd. Probeer het opnieuw.', 'error');
                } else if (event.error === 'not-allowed') {
                    showStatus('Microfoon toegang geweigerd. Zorg dat je website (via safari instellingen) toestemming hebt gegeven.', 'error');
                } else {
                    showStatus('Fout: ' + event.error, 'error');
                }
            };
        }

        // --- Historie Functies ---
        function saveToHistory(text) {
            // Voeg toe aan begin van array
            const record = {
                id: Date.now(),
                text: text,
                date: new Date().toISOString()
            };

            historyArray.unshift(record);

            // Beperk tot laatste 20 items om opslag niet te vol te maken
            if (historyArray.length > 20) {
                historyArray = historyArray.slice(0, 20);
            }

            localStorage.setItem('dicteerHistory', JSON.stringify(historyArray));
            renderHistory();
        }

        function renderHistory() {
            historyList.innerHTML = '';

            if (historyArray.length === 0) {
                historyList.innerHTML = '<div class="empty-history">Nog geen historie beschikbaar. Jouw gedicteerde teksten verschijnen hier.</div>';
                clearHistoryBtn.classList.add('hidden');
                return;
            }

            clearHistoryBtn.classList.remove('hidden');

            historyArray.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'history-item';

                // Voeg animatie toe aan de bovenste/nieuwste wanneer we net gerenderd hebben 
                // in plaats van allemaal ineens
                if (index === 0) {
                    div.classList.add('slide-in');
                }

                // Formatteer datum netjes
                const dateObj = new Date(item.date);
                const isToday = new Date().toDateString() === dateObj.toDateString();
                const dateStr = isToday
                    ? `Vandaag, ${dateObj.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' })}`
                    : dateObj.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });

                // Pak alleen de eerste zin voor preview
                let previewText = item.text;
                const firstSentenceEnd = item.text.indexOf('.');
                if (firstSentenceEnd !== -1 && firstSentenceEnd < 60) {
                    previewText = item.text.substring(0, firstSentenceEnd + 1);
                } else if (item.text.length > 60) {
                    previewText = item.text.substring(0, 60) + '...';
                }

                div.innerHTML = `
                    <div class="history-date">${dateStr}</div>
                    <div class="history-preview">"${previewText}"</div>
                `;

                div.addEventListener('click', () => {
                    textArea.value = item.text + '\n\n';
                    showStatus('Tekst geladen uit historie', 'info');
                    setTimeout(hideStatus, 2000);
                    // Scroll netjes naar boven
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });

                historyList.appendChild(div);
            });
        }

        // Initieer historie bij laden
        renderHistory();

        clearHistoryBtn.addEventListener('click', () => {
            if (confirm('Weet je zeker dat je de hele historie wilt wissen?')) {
                historyArray = [];
                localStorage.removeItem('dicteerHistory');
                renderHistory();
                settingsModal.classList.remove('active'); // Sluit de modal na wissen
                showStatus('Historie opgeruimd', 'info');
                setTimeout(hideStatus, 2000);
            }
        });
        // --- Einde Historie Functies ---

        // Luister naar visibility change om wake lock te herstellen als app terugkomt
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && isListening) {
                requestWakeLock();
            }
        });

        startBtn.addEventListener('click', () => {
            if (!recognition) return;

            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
            }
        });

        clearBtn.addEventListener('click', () => {
            if (!textArea.value.trim()) return;

            // Sla tekst op voor "Ongedaan Maken"
            tempDeletedText = textArea.value;

            textArea.value = '';
            updateWordCount();

            // Toon de popup
            undoToast.classList.add('show');
            clearTimeout(undoTimeout);
            undoTimeout = setTimeout(() => {
                undoToast.classList.remove('show');
                tempDeletedText = ''; // Vrijgeven geheugen
            }, 5000);

            showStatus('Tekst gewist', 'info');
            setTimeout(hideStatus, 2000);
        });

        undoBtn.addEventListener('click', () => {
            if (tempDeletedText) {
                textArea.value = tempDeletedText;
                tempDeletedText = '';
                updateWordCount();

                undoToast.classList.remove('show');
                clearTimeout(undoTimeout);

                showStatus('Oepsie hersteld!', 'info');
                setTimeout(hideStatus, 2000);
            }
        });

        shareBtn.addEventListener('click', async () => {
            const textToShare = textArea.value.trim();
            if (!textToShare) {
                showStatus('Niets om te delen', 'error');
                setTimeout(hideStatus, 2000);
                return;
            }

            // Let op: navigator.share werkt op iOS ALLEEN via HTTPS (beveiligd). 
            // Op een lokaal IP adres (HTTP) valt dit altijd terug naar de Kopiëren fallback.
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Dicteer App',
                        text: textToShare
                    });

                    textArea.value = '';
                    updateWordCount();
                    showStatus('Succesvol gedeeld!', 'info');
                    setTimeout(hideStatus, 2000);
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        fallbackCopy(textToShare);
                    }
                }
            } else {
                // Als we geen navigator.share hebben, check of we lokaal/onbeveiligd testen
                if (window.location.protocol === 'http:' && window.location.hostname !== 'localhost') {
                    showStatus('Delen vereist HTTPS op iOS. Gekopieerd in plaats daarvan.', 'info');
                    setTimeout(hideStatus, 3000);
                }
                fallbackCopy(textToShare);
            }
        });

        function fallbackCopy(text) {
            textArea.select();
            document.execCommand('copy');
            textArea.value = '';
            updateWordCount();
            showStatus('Gekopieerd & veld leeggemaakt!', 'info');
            setTimeout(hideStatus, 2000);
        }

        // Functie om te delen met Gemini prompt
        async function shareWithGemini(actionType) {
            const text = textArea.value.trim();

            if (!text) {
                showStatus('Geen tekst om te delen', 'error');
                setTimeout(hideStatus, 2000);
                return;
            }

            let prompt = text;

            // Google Calendar prompts
            if (actionType === 'newCalendar') {
                prompt = `Hi Gemini, ik wil een nieuwe afspraak maken in mijn Google Agenda: ${text}`;
            }
            // Google Tasks prompts
            else if (actionType === 'newTask') {
                prompt = `Hi Gemini, ik wil een nieuwe taak aanmaken in mijn Google Tasks: ${text}`;
            }


            // Kopieer de prompt eerst naar het klembord voor de zekerheid
            try {
                await navigator.clipboard.writeText(prompt);
                showStatus('Prompt gekopieerd! Gemini wordt geopend...', 'info');
            } catch (err) {
                console.error('Kon niet kopiëren naar klembord', err);
                showStatus('Gemini wordt geopend...', 'info');
            }

            // Opmerking: Gemini web ondersteunt momenteel geen officiële URL parameter (zoals ?q=) 
            // om de zoekbalk direct in te vullen. De enige betrouwbare manier is dat de tekst
            // al op het klembord staat, zodat de gebruiker het alleen hoeft te plakken.

            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

            // Probeer op iOS specifiek de Google (Gemini) app te openen via een custom URL scheme
            if (isIOS) {
                const appUrl = "googleapp://";
                const webUrl = "https://gemini.google.com/app";

                // Om de vervelende melding "Safari kan de pagina niet openen omdat het 
                // adres ongeldig is" te voorkomen (als de app niet/verkeerd geïnstalleerd is),
                // injecteren we de link onzichtbaar in een iframe.

                let fallbackTriggered = false;

                // Fallback mechanisme: Als de app niet opstart binnen 1.5s, ga naar web
                const fallbackTimer = setTimeout(function () {
                    fallbackTriggered = true;
                    window.location.href = webUrl;
                }, 1500);

                // Verborgen iframe maken
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = appUrl;

                // Zodra het iframe is geladen, gaan we ervan uit dat het URL scheme 
                // succesvol is afgevangen door iOS als we niet al in navigeren zijn.
                iframe.onload = function () {
                    // Mocht de app wel laden en de browser op de achtergrond open blijven
                    clearTimeout(fallbackTimer);
                };

                document.body.appendChild(iframe);

                // Opruimen iframe
                setTimeout(() => {
                    if (document.body.contains(iframe)) {
                        document.body.removeChild(iframe);
                    }
                }, 2000);

            } else if (isMobile) {
                // Android/andere mobiele apparaten
                window.location.href = "https://gemini.google.com/app";
            } else {
                // Op desktop: open netjes in een nieuw tabblad
                window.open("https://gemini.google.com/app", '_blank');
            }

            // Leeg het tekstveld nadat we de prompt succesvol aan het klembord hebben gegeven of verstuurd
            textArea.value = '';
            updateWordCount();

            // Wacht even zodat gebruiker de status in theorie nog kan lezen
            setTimeout(() => {
                hideStatus();
            }, 1000);
        }

        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
            statusDiv.classList.remove('hidden');
        }

        function hideStatus() {
            statusDiv.classList.add('hidden');
        }

        // Event listeners voor alle knoppen
        newCalendarBtn.addEventListener('click', () => shareWithGemini('newCalendar'));
        newTaskBtn.addEventListener('click', () => shareWithGemini('newTask'));

        // Service Worker registratie voor PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('Service Worker geregistreerd'))
                    .catch(err => console.log('Service Worker registratie mislukt:', err));
            });
        }
    </script>
